name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  # ============================================
  # Windows Build (unchanged — onedir zip)
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller RenLocalizer.spec

      - name: Create archive
        run: |
          cd dist
          Compress-Archive -Path RenLocalizer -DestinationPath ../RenLocalizer-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: RenLocalizer-Windows-x64.zip

  # ============================================
  # Linux Build → AppImage
  # ============================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller RenLocalizer.spec

      - name: Convert icon
        run: |
          convert icon.ico[0] -resize 256x256 renlocalizer.png

      - name: Create AppImage
        run: |
          # Create AppDir structure
          mkdir -p RenLocalizer.AppDir/usr/bin

          # Copy PyInstaller output
          cp -R dist/RenLocalizer RenLocalizer.AppDir/usr/bin/RenLocalizer

          # Copy AppImage metadata
          cp build/linux/AppRun RenLocalizer.AppDir/AppRun
          chmod +x RenLocalizer.AppDir/AppRun

          cp build/linux/renlocalizer.desktop RenLocalizer.AppDir/renlocalizer.desktop
          cp renlocalizer.png RenLocalizer.AppDir/renlocalizer.png

          # Also place .desktop and icon in standard locations
          mkdir -p RenLocalizer.AppDir/usr/share/applications
          mkdir -p RenLocalizer.AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/linux/renlocalizer.desktop RenLocalizer.AppDir/usr/share/applications/
          cp renlocalizer.png RenLocalizer.AppDir/usr/share/icons/hicolor/256x256/apps/

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build AppImage (use --appimage-extract-and-run for environments without FUSE)
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run RenLocalizer.AppDir RenLocalizer-Linux-x64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: RenLocalizer-Linux-x64.AppImage

  # ============================================
  # macOS Build → DMG
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller RenLocalizer.spec

      - name: Create .app bundle
        run: |
          chmod +x build/macos/create_app_bundle.sh
          ./build/macos/create_app_bundle.sh dist/RenLocalizer RenLocalizer.app

      - name: Create DMG
        run: |
          # Create a temporary DMG directory with the .app
          mkdir -p dmg_contents
          cp -R RenLocalizer.app dmg_contents/

          # Add a symlink to /Applications for drag-and-drop install
          ln -s /Applications dmg_contents/Applications

          # Create DMG
          hdiutil create \
            -volname "RenLocalizer" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            RenLocalizer-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: RenLocalizer-macOS.dmg

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            RenLocalizer-Windows-x64.zip
            RenLocalizer-Linux-x64.AppImage
            RenLocalizer-macOS.dmg
          body: ""
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
