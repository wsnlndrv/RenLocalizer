name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  # ============================================
  # Windows Build (unchanged — onedir zip)
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller RenLocalizer.spec

      - name: Create archive
        run: |
          cd dist
          Compress-Archive -Path RenLocalizer -DestinationPath ../RenLocalizer-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: RenLocalizer-Windows-x64.zip

  # ============================================
  # Linux Build → AppImage
  # ============================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick xvfb \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 libxcb-glx0 \
            libxcb-cursor0 \
            fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller RenLocalizer.spec

      - name: Smoke test Qt startup (Linux native)
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(os.environ, RENLOCALIZER_QT_SMOKE_TEST="1")
          subprocess.run(
              ["xvfb-run", "-a", "./dist/RenLocalizer/RenLocalizer"],
              env=env,
              check=True,
              timeout=60,
          )
          PY

      - name: Smoke test Qt startup (Linux software fallback)
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(
              os.environ,
              RENLOCALIZER_QT_SMOKE_TEST="1",
              RENLOCALIZER_QT_RENDER_MODE="software",
          )
          subprocess.run(
              ["xvfb-run", "-a", "./dist/RenLocalizer/RenLocalizer"],
              env=env,
              check=True,
              timeout=60,
          )
          PY

      - name: Convert icon
        run: |
          convert icon.ico[0] -resize 256x256 renlocalizer.png

      - name: Bundle emoji font into build output
        run: |
          # Copy Noto Color Emoji font so emoji icons render on all Linux systems
          EMOJI_FONT="/usr/share/fonts/truetype/noto/NotoColorEmoji.ttf"
          if [ -f "$EMOJI_FONT" ]; then
            mkdir -p dist/RenLocalizer/fonts
            cp "$EMOJI_FONT" dist/RenLocalizer/fonts/
            echo "✓ Bundled NotoColorEmoji.ttf"
          else
            echo "⚠ NotoColorEmoji.ttf not found at expected path, searching..."
            FOUND=$(find /usr/share/fonts -iname 'NotoColorEmoji*' -type f | head -1)
            if [ -n "$FOUND" ]; then
              mkdir -p dist/RenLocalizer/fonts
              cp "$FOUND" dist/RenLocalizer/fonts/NotoColorEmoji.ttf
              echo "✓ Bundled from $FOUND"
            else
              echo "✗ No emoji font found — icons may not render on minimal distros"
            fi
          fi

      - name: Create AppImage
        run: |
          # Create AppDir structure
          mkdir -p RenLocalizer.AppDir/usr/bin
          
          # Copy PyInstaller output (includes bundled fonts/)
          cp -R dist/RenLocalizer RenLocalizer.AppDir/usr/bin/RenLocalizer
          
          # Copy AppImage metadata
          cp build/linux/AppRun RenLocalizer.AppDir/AppRun
          chmod +x RenLocalizer.AppDir/AppRun
          
          cp build/linux/renlocalizer.desktop RenLocalizer.AppDir/renlocalizer.desktop
          cp renlocalizer.png RenLocalizer.AppDir/renlocalizer.png
          
          # Create .DirIcon for the AppImage file itself (standard requirement)
          cp renlocalizer.png RenLocalizer.AppDir/.DirIcon
          
          # Also place .desktop and icon in standard locations for integration
          mkdir -p RenLocalizer.AppDir/usr/share/applications
          mkdir -p RenLocalizer.AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/linux/renlocalizer.desktop RenLocalizer.AppDir/usr/share/applications/
          cp renlocalizer.png RenLocalizer.AppDir/usr/share/icons/hicolor/256x256/apps/renlocalizer.png
          
          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          
          # Build AppImage
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run RenLocalizer.AppDir RenLocalizer-Linux-x64.AppImage
          chmod +x RenLocalizer-Linux-x64.AppImage

      - name: Smoke test AppImage startup (Linux native)
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(os.environ, RENLOCALIZER_QT_SMOKE_TEST="1", APPIMAGE_EXTRACT_AND_RUN="1")
          subprocess.run(
              ["xvfb-run", "-a", "./RenLocalizer-Linux-x64.AppImage"],
              env=env,
              check=True,
              timeout=60,
          )
          PY

      - name: Smoke test AppImage startup (Linux software fallback)
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(
              os.environ,
              RENLOCALIZER_QT_SMOKE_TEST="1",
              RENLOCALIZER_QT_RENDER_MODE="software",
              APPIMAGE_EXTRACT_AND_RUN="1",
          )
          subprocess.run(
              ["xvfb-run", "-a", "./RenLocalizer-Linux-x64.AppImage"],
              env=env,
              check=True,
              timeout=60,
          )
          PY

      - name: Create tar.gz (Linux Portable)
        run: |
          cd dist
          tar -czvf ../RenLocalizer-Linux-x64.tar.gz RenLocalizer
          cd ..

      - name: Upload artifact (AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-appimage
          path: RenLocalizer-Linux-x64.AppImage

      - name: Upload artifact (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-targz
          path: RenLocalizer-Linux-x64.tar.gz

  # ============================================
  # macOS Build → DMG
  # ============================================
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            artifact_suffix: arm64
          - runner: macos-15-intel
            artifact_suffix: intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller RenLocalizer.spec

      - name: Create .app bundle
        run: |
          chmod +x build/macos/create_app_bundle.sh
          ./build/macos/create_app_bundle.sh dist/RenLocalizer RenLocalizer.app

      - name: Smoke test Qt startup (macOS native)
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(os.environ, RENLOCALIZER_QT_SMOKE_TEST="1")
          subprocess.run(
              ["./RenLocalizer.app/Contents/MacOS/launch"],
              env=env,
              check=True,
              timeout=60,
          )
          PY

      - name: Smoke test Qt startup (macOS software fallback)
        run: |
          python - <<'PY'
          import os
          import subprocess
          env = dict(
              os.environ,
              RENLOCALIZER_QT_SMOKE_TEST="1",
              RENLOCALIZER_QT_RENDER_MODE="software",
          )
          subprocess.run(
              ["./RenLocalizer.app/Contents/MacOS/launch"],
              env=env,
              check=True,
              timeout=60,
          )
          PY

      - name: Create DMG
        run: |
          # Create a temporary DMG directory with the .app
          mkdir -p dmg_contents
          cp -R RenLocalizer.app dmg_contents/

          # Add a symlink to /Applications for drag-and-drop install
          ln -s /Applications dmg_contents/Applications

          # Force sync and wait briefly to avoid "Resource busy" race conditions
          sync
          sleep 5

          # Create DMG
          hdiutil create \
            -volname "RenLocalizer" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            RenLocalizer-macOS-${{ matrix.artifact_suffix }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.artifact_suffix }}
          path: RenLocalizer-macOS-${{ matrix.artifact_suffix }}.dmg

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build-appimage

      - name: Download Linux tar.gz artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build-targz

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build-arm64

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build-intel

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            RenLocalizer-Windows-x64.zip
            RenLocalizer-Linux-x64.AppImage
            RenLocalizer-Linux-x64.tar.gz
            RenLocalizer-macOS-arm64.dmg
            RenLocalizer-macOS-intel.dmg
          body: ""
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
